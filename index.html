<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghisleni Kaffee Büro Züri</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f5f0eb;
      color: #1a1108;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 1.5rem 1rem 3rem;
    }
    #app {
      width: 100%;
      max-width: 860px;
      background: #fff;
      border-radius: 14px;
      border: 1px solid #e0d6cc;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(60,30,10,0.10);
    }

    /* ---- HEADER ---- */
    .app-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #e8ddd4;
      display: flex; align-items: center; gap: 14px;
      background: #fffaf6;
    }
    .app-logo {
      height: 36px; flex-shrink: 0; display: flex; align-items: center;
    }
    .app-logo img {
      height: 36px; width: auto; display: block;
    }
    .app-title { font-size: 16px; font-weight: 600; color: #1a1108; }
    .app-sub { font-size: 12px; color: #8a6a4a; margin-top: 1px; }
    .cap-legend { display: flex; gap: 12px; align-items: center; margin-left: auto; }
    .cap-legend span { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #8a6a4a; }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }

    /* ---- NAV ---- */
    .nav-bar {
      display: flex; gap: 6px; padding: 0.6rem 1.25rem;
      border-bottom: 1px solid #e8ddd4; background: #fffaf6;
    }
    .nav-btn {
      padding: 5px 16px; border: 1px solid #d4c4b4;
      border-radius: 8px; background: transparent;
      cursor: pointer; font-size: 13px; color: #7a5a3a;
      font-family: inherit; transition: background 0.15s;
    }
    .nav-btn:hover { background: #f5ece2; }
    .nav-btn.active {
      background: #f0e4d4; border-color: #b89070;
      color: #3a1f08; font-weight: 600;
    }

    /* ---- CALENDAR ---- */
    .cal-section { padding: 1.25rem; }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 4px; margin-bottom: 1.5rem;
    }
    .cal-dh {
      text-align: center; font-size: 11px; color: #9a7a5a;
      padding: 4px 0; font-weight: 600; letter-spacing: 0.03em;
    }
    .cal-day {
      aspect-ratio: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border-radius: 8px; font-size: 14px;
      border: 1px solid transparent; cursor: default; position: relative;
      transition: background 0.12s;
    }
    .cal-day.work { border-color: #e0d0c0; cursor: pointer; }
    .cal-day.work:hover { background: #fdf0e4; }
    .cal-day.weekend { color: #c0a888; }
    .cal-day.holiday { background: #fff8e8; border-color: #f0d080; color: #b08020; }
    .cal-day.today { background: #e8f4ff; border-color: #90c0f0; color: #1860b0; font-weight: 700; }
    .cal-day.selected { border: 2px solid #c07030; background: #fff6ee; }
    .cal-holiday-label { font-size: 8px; color: #b08020; line-height: 1.2; margin-top: 1px; text-align: center; }

    /* ---- OVERVIEW GRID ---- */
    .section-label { font-size: 12px; font-weight: 600; color: #8a6a4a; margin-bottom: 10px; letter-spacing: 0.02em; }
    .person-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(118px, 1fr)); gap: 7px; }
    .person-card {
      background: #fffaf6; border: 1px solid #e4d8cc;
      border-radius: 9px; padding: 9px 11px; cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
    }
    .person-card:hover { border-color: #c09070; background: #fff5eb; }
    .person-card-name { font-size: 12px; font-weight: 600; margin-bottom: 6px; color: #2a1008; }
    .caps-row { display: flex; gap: 4px; flex-wrap: wrap; }
    .person-card-count { font-size: 10px; color: #a08060; margin-top: 4px; }

    /* ---- DAY VIEW ---- */
    .day-header {
      padding: 0.85rem 1.25rem; border-bottom: 1px solid #e8ddd4;
      background: #fffaf6;
    }
    .day-title { font-size: 15px; font-weight: 600; color: #1a1108; }
    .day-hint { font-size: 11px; color: #9a7a5a; margin-top: 2px; }
    .trade-alert {
      padding: 8px 1.25rem; background: #fff8e0;
      border-bottom: 1px solid #f0d870; font-size: 12px;
      color: #9a7800; font-weight: 600;
    }
    .person-row {
      border-bottom: 1px solid #f0e8de;
    }
    .person-row-inner {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 1.25rem; flex-wrap: wrap;
    }
    .person-row-name { font-size: 13px; font-weight: 600; min-width: 88px; color: #2a1008; }
    .caps-display { display: flex; gap: 3px; align-items: center; }
    .cap-count { font-size: 10px; color: #b09070; flex: 1; }
    .btn { border-radius: 7px; background: transparent; cursor: pointer; font-family: inherit; transition: background 0.1s; }
    .btn-r { padding: 3px 8px; border: 1px solid #e05050; font-size: 11px; color: #c03030; }
    .btn-r:hover { background: #fff0f0; }
    .btn-g { padding: 3px 8px; border: 1px solid #d09020; font-size: 11px; color: #a07010; }
    .btn-g:hover { background: #fffae0; }
    .btn-undo { padding: 3px 8px; border: 1px solid #d0c0b0; font-size: 10px; color: #907060; }
    .btn-undo:hover { background: #f8f0e8; }
    .btn-trade { padding: 3px 11px; border: 1px solid #5090d0; font-size: 11px; color: #1060b0; border-radius: 7px; background: transparent; cursor: pointer; font-family: inherit; }
    .btn-trade:hover { background: #eef4ff; }
    .btn-trade.open { background: #e8f0ff; border-color: #3070c0; color: #1050a0; font-weight: 600; }

    /* ---- TRADE FORM ---- */
    .trade-form {
      padding: 8px 1.25rem 12px; background: #fdf7f0;
      border-top: 1px solid #ecdccc;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .trade-form label { font-size: 12px; color: #7a5a3a; }
    .trade-form select {
      font-size: 12px; padding: 4px 8px;
      border: 1px solid #d4c4b0; border-radius: 7px;
      background: #fff; color: #2a1008; font-family: inherit;
    }
    .btn-propose { padding: 4px 14px; border: 1px solid #40a060; border-radius: 7px; background: transparent; cursor: pointer; font-size: 12px; color: #207040; font-family: inherit; }
    .btn-propose:hover { background: #eefff4; }
    .btn-cancel { padding: 4px 10px; border: 1px solid #c0b0a0; border-radius: 7px; background: transparent; cursor: pointer; font-size: 12px; color: #7a6a5a; font-family: inherit; }
    .btn-cancel:hover { background: #f8f4f0; }

    /* ---- INCOMING TRADE ---- */
    .incoming-trade {
      padding: 7px 1.25rem; background: #fffbea;
      border-top: 1px solid #f0e090;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .incoming-trade-text { font-size: 12px; color: #806000; flex: 1; }
    .btn-accept { padding: 3px 11px; border: 1px solid #40a060; border-radius: 7px; background: transparent; cursor: pointer; font-size: 11px; color: #207040; font-family: inherit; }
    .btn-accept:hover { background: #eefff4; }
    .btn-reject { padding: 3px 11px; border: 1px solid #d04040; border-radius: 7px; background: transparent; cursor: pointer; font-size: 11px; color: #a02020; font-family: inherit; }
    .btn-reject:hover { background: #fff0f0; }

    /* ---- TRADES VIEW ---- */
    .trades-section { padding: 1.25rem; }
    .trades-subtitle { font-size: 12px; font-weight: 600; color: #8a6a4a; margin-bottom: 9px; margin-top: 4px; letter-spacing: 0.02em; }
    .trade-card {
      background: #fffaf6; border: 1px solid #f0d880;
      border-radius: 9px; padding: 11px 14px; margin-bottom: 8px;
    }
    .trade-card-date { font-size: 11px; color: #9a7a5a; margin-bottom: 3px; }
    .trade-card-desc { font-size: 13px; color: #1a1108; margin-bottom: 9px; }
    .trade-card-actions { display: flex; gap: 8px; }
    .trade-done {
      background: #f8f4f0; border: 1px solid #e8dcd0;
      border-radius: 9px; padding: 9px 14px; margin-bottom: 6px; opacity: 0.85;
    }
    .trade-done-date { font-size: 11px; color: #9a7a5a; margin-bottom: 2px; }
    .trade-done-row { display: flex; align-items: center; gap: 8px; }
    .trade-done-text { font-size: 13px; color: #4a3a2a; }
    .status-ok { font-size: 11px; color: #30904a; margin-left: auto; font-weight: 600; }
    .status-no { font-size: 11px; color: #c03030; margin-left: auto; font-weight: 600; }
    .empty-state { text-align: center; padding: 2.5rem; color: #c0a888; font-size: 13px; }

    @media (max-width: 560px) {
      body { padding: 0; }
      #app { border-radius: 0; border: none; min-height: 100vh; }
      .person-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
      .person-row-inner { gap: 5px; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<script>
var PARTICIPANTS = ["Angela","Aline","Anastasija","Arbnora","Caroline","Christoph","Clara","Claus","Conny","Diego","Fabienne","Florian","Gina","Guy","Jenny","Lorena","Matthias","Nicole","Patrice","Seinab","Selmin"];
var HOLIDAYS = {"2026-04-03":"Karfreitag","2026-04-06":"Ostermontag"};
var TODAY = (function(){var d=new Date();var m=d.getMonth(),y=d.getFullYear();if(y===2026&&m===3){var dd=d.getDate();return"2026-04-"+(dd<10?"0":"")+dd;}return"2026-04-02";})();

var view = "calendar";
var selectedDate = null;
var expandedPerson = null;
var allocations = {};
var tradeList = [];

var DAYS = (function(){
  var d=[];
  for(var i=1;i<=30;i++){
    var dt=new Date(2026,3,i);
    var ds="2026-04-"+(i<10?"0":"")+i;
    var dow=dt.getDay();
    var iw=dow===0||dow===6;
    var ih=!!HOLIDAYS[ds];
    d.push({d:i,ds:ds,dow:dow,iw:iw,ih:ih,work:!iw&&!ih});
  }
  return d;
})();

/* ---- Storage (localStorage) ---- */
function doSave(){
  try{
    localStorage.setItem("gkbz_a",JSON.stringify(allocations));
    localStorage.setItem("gkbz_t",JSON.stringify(tradeList));
  }catch(e){}
}
function doLoad(){
  try{
    var a=localStorage.getItem("gkbz_a");
    var t=localStorage.getItem("gkbz_t");
    if(a)allocations=JSON.parse(a);
    if(t)tradeList=JSON.parse(t);
  }catch(e){}
  render();
}

/* ---- Data helpers ---- */
/* 11 people get 2R+1G, 10 get 1R+2G -> totals: 32R / 31G */
var TWO_GOLD = {"Aline":1,"Arbnora":1,"Christoph":1,"Claus":1,"Diego":1,"Florian":1,"Guy":1,"Lorena":1,"Nicole":1,"Seinab":1};
function defaultAlloc(person){
  return TWO_GOLD[person] ? {red:1,gold:2,ur:0,ug:0} : {red:2,gold:1,ur:0,ug:0};
}
function getAlloc(date,person){
  var k=date+"||"+person;
  return allocations[k]||defaultAlloc(person);
}
function remOf(a,type){return a[type]-(type==="red"?a.ur:a.ug);}
function setAlloc(date,person,val){allocations[date+"||"+person]=val;}

/* ---- Actions ---- */
function setView(v){view=v;render();}
function selectDay(ds){selectedDate=ds;view="day";expandedPerson=null;render();}
function toggleForm(p){expandedPerson=(expandedPerson===p?null:p);render();}

function doUseCap(date,person,type){
  var a=getAlloc(date,person);
  if(remOf(a,type)<=0)return;
  var na=Object.assign({},a);
  if(type==="red")na.ur++;else na.ug++;
  setAlloc(date,person,na);doSave();render();
}
function doUndoCap(date,person,type){
  var a=getAlloc(date,person);
  var na=Object.assign({},a);
  if(type==="red"){if(a.ur<=0)return;na.ur--;}else{if(a.ug<=0)return;na.ug--;}
  setAlloc(date,person,na);doSave();render();
}
function doAccept(id){
  var t=tradeList.find(function(x){return x.id===id;});
  if(!t||t.status!=="pending")return;
  var oa=getAlloc(t.date,t.off),ra=getAlloc(t.date,t.rec);
  var ona=Object.assign({},oa),rna=Object.assign({},ra);
  ona[t.ot]=oa[t.ot]-1;ona[t.rt]=oa[t.rt]+1;
  rna[t.rt]=ra[t.rt]-1;rna[t.ot]=ra[t.ot]+1;
  setAlloc(t.date,t.off,ona);setAlloc(t.date,t.rec,rna);
  t.status="accepted";doSave();render();
}
function doReject(id){
  var t=tradeList.find(function(x){return x.id===id;});
  if(t)t.status="rejected";doSave();render();
}
function doPropose(date,offerer){
  var ot=document.getElementById("ot").value;
  var rt=document.getElementById("rt").value;
  var rec=document.getElementById("rec").value;
  tradeList.push({id:Date.now()+""+Math.random().toString(36).slice(2),date:date,off:offerer,ot:ot,rec:rec,rt:rt,status:"pending",ts:Date.now()});
  expandedPerson=null;doSave();render();
}
function doReset(){
  if(!confirm("Wirklich alle Daten zurücksetzen?"))return;
  allocations={};tradeList=[];doSave();render();
}

/* ---- Helpers ---- */
function fmtDate(ds){
  var d=new Date(ds+"T12:00:00");
  return d.toLocaleDateString("de-CH",{weekday:"long",day:"numeric",month:"long"});
}
function capColor(t){return t==="red"?"#e05050":"#d09020";}
function capLabel(t){return t==="red"?"Rote Kapsel":"Goldene Kapsel";}
function dotHtml(type,used){
  return '<span class="dot" style="background:'+capColor(type)+';opacity:'+(used?0.2:1)+';"></span>';
}

  var h="";

function renderCal(){
  var h='<div class="cal-section">';
  h+='<div class="cal-grid">';
  var wdn=["Mo","Di","Mi","Do","Fr","Sa","So"];
  for(var wi=0;wi<7;wi++) h+='<div class="cal-dh">'+wdn[wi]+'</div>';
  /* April 1 = Wednesday = index 2 (Mon-first) → 2 empty cells */
  h+='<div></div><div></div>';
  for(var di=0;di<DAYS.length;di++){
    var day=DAYS[di];
    var isToday=day.ds===TODAY,isSel=day.ds===selectedDate;
    var cls="cal-day";
    if(day.ih) cls+=" holiday";
    else if(day.iw) cls+=" weekend";
    else cls+=" work";
    if(isToday&&day.work) cls+=" today";
    if(isSel&&day.work) cls+=" selected";
    var click=day.work?'onclick="selectDay(\''+day.ds+'\')"':'';
    var sub=day.ih?'<div class="cal-holiday-label">'+HOLIDAYS[day.ds]+'</div>':(day.iw?'<div class="cal-holiday-label" style="color:#c0a888;">WE</div>':'');
    h+='<div class="'+cls+'" '+click+'>'+day.d+sub+'</div>';
  }
  h+='</div>';

  h+='<div class="section-label">Heute &mdash; '+fmtDate(TODAY)+'</div>';
  h+='<div class="person-grid">';
  for(var pi=0;pi<PARTICIPANTS.length;pi++){
    var p=PARTICIPANTS[pi];
    var al=getAlloc(TODAY,p);
    var rr=remOf(al,"red"),rg=remOf(al,"gold");
    var dots="";
    for(var ri=0;ri<al.red;ri++) dots+=dotHtml("red",ri>=rr);
    for(var gi=0;gi<al.gold;gi++) dots+=dotHtml("gold",gi>=rg);
    h+='<div class="person-card" onclick="selectDay(\''+TODAY+'\')">';
    h+='<div class="person-card-name">'+p+'</div>';
    h+='<div class="caps-row">'+dots+'</div>';
    h+='<div class="person-card-count">'+(rr+rg)+' übrig</div>';
    h+='</div>';
  }
  h+='</div></div>';
  return h;
}

function renderDay(){
  var date=selectedDate;
  var h='<div class="day-header"><div class="day-title">'+fmtDate(date)+'</div>';
  h+='<div class="day-hint">3 Kapseln pro Person &nbsp;&middot;&nbsp; -R/-G = benutzt &nbsp;&middot;&nbsp; &#8629; = rückgängig</div></div>';

  var dayPending=tradeList.filter(function(t){return t.date===date&&t.status==="pending";});
  if(dayPending.length>0){
    h+='<div class="trade-alert">'+dayPending.length+' offene Tauschofferte'+(dayPending.length!==1?"n":"")+" für diesen Tag</div>";
  }

  for(var pi=0;pi<PARTICIPANTS.length;pi++){
    var p=PARTICIPANTS[pi];
    var al=getAlloc(date,p);
    var rr=remOf(al,"red"),rg=remOf(al,"gold");
    var dots="";
    for(var ri=0;ri<al.red;ri++) dots+=dotHtml("red",ri>=rr);
    for(var gi=0;gi<al.gold;gi++) dots+=dotHtml("gold",gi>=rg);
    var exp=expandedPerson===p;
    var incoming=tradeList.filter(function(t){return t.date===date&&t.rec===p&&t.status==="pending";});

    h+='<div class="person-row"><div class="person-row-inner">';
    h+='<div class="person-row-name">'+p+'</div>';
    h+='<div class="caps-display">'+dots+'</div>';
    h+='<div class="cap-count">'+rr+'R &nbsp;'+rg+'G</div>';
    h+='<button class="btn btn-r" onclick="doUseCap(\''+date+'\',\''+p+'\',\'red\')" title="Rote Kapsel benutzen">-R</button>';
    h+='<button class="btn btn-g" onclick="doUseCap(\''+date+'\',\''+p+'\',\'gold\')" title="Goldene Kapsel benutzen">-G</button>';
    h+='<button class="btn btn-undo" onclick="doUndoCap(\''+date+'\',\''+p+'\',\'red\')" title="Rückgängig Rot">&#8629;R</button>';
    h+='<button class="btn btn-undo" onclick="doUndoCap(\''+date+'\',\''+p+'\',\'gold\')" title="Rückgängig Gold">&#8629;G</button>';
    h+='<button class="btn-trade'+(exp?" open":"")+'" onclick="toggleForm(\''+p+'\')">&#8651; Tausch</button>';
    h+='</div>';

    if(exp){
      var others=PARTICIPANTS.filter(function(x){return x!==p;});
      var recOpts="";
      for(var oi=0;oi<others.length;oi++) recOpts+='<option>'+others[oi]+'</option>';
      h+='<div class="trade-form">';
      h+='<label>'+p+' gibt</label>';
      h+='<select id="ot"><option value="red">Rote Kapsel</option><option value="gold">Goldene Kapsel</option></select>';
      h+='<label>für</label>';
      h+='<select id="rt"><option value="gold">Goldene Kapsel</option><option value="red">Rote Kapsel</option></select>';
      h+='<label>von</label>';
      h+='<select id="rec">'+recOpts+'</select>';
      h+='<button class="btn-propose" onclick="doPropose(\''+date+'\',\''+p+'\')">Anbieten</button>';
      h+='<button class="btn-cancel" onclick="toggleForm(null)">Abbrechen</button>';
      h+='</div>';
    }

    for(var ii=0;ii<incoming.length;ii++){
      var tr=incoming[ii];
      h+='<div class="incoming-trade">';
      h+='<span class="incoming-trade-text"><strong>'+tr.off+'</strong> gibt '+capLabel(tr.ot)+' &#8651; bekommt '+capLabel(tr.rt)+' von '+p+'</span>';
      h+='<button class="btn-accept" onclick="doAccept(\''+tr.id+'\')">&#10003; Annehmen</button>';
      h+='<button class="btn-reject" onclick="doReject(\''+tr.id+'\')">&#10005; Ablehnen</button>';
      h+='</div>';
    }
    h+='</div>';
  }
  return h;
}

function renderTrades(){
  var h='<div class="trades-section">';
  var pending=tradeList.filter(function(t){return t.status==="pending";});
  var done=tradeList.filter(function(t){return t.status!=="pending";});

  if(tradeList.length===0){
    h+='<div class="empty-state">Noch keine Tauschofferten.<br>In der Tagessicht auf &#8651; Tausch klicken.</div>';
  }

  if(pending.length>0){
    h+='<div class="trades-subtitle">Offene Offerten ('+pending.length+')</div>';
    var ps=pending.slice().sort(function(a,b){return b.ts-a.ts;});
    for(var pi=0;pi<ps.length;pi++){
      var t=ps[pi];
      h+='<div class="trade-card">';
      h+='<div class="trade-card-date">'+fmtDate(t.date)+'</div>';
      h+='<div class="trade-card-desc"><strong>'+t.off+'</strong> gibt '+capLabel(t.ot)+' &mdash; bekommt '+capLabel(t.rt)+' von <strong>'+t.rec+'</strong></div>';
      h+='<div class="trade-card-actions">';
      h+='<button class="btn-accept" onclick="doAccept(\''+t.id+'\')">&#10003; Annehmen</button>';
      h+='<button class="btn-reject" onclick="doReject(\''+t.id+'\')">&#10005; Ablehnen</button>';
      h+='</div></div>';
    }
  }

  if(done.length>0){
    h+='<div class="trades-subtitle" style="margin-top:16px;">Abgeschlossen ('+done.length+')</div>';
    var ds2=done.slice().sort(function(a,b){return b.ts-a.ts;});
    for(var di=0;di<ds2.length;di++){
      var td=ds2[di];
      var ok=td.status==="accepted";
      h+='<div class="trade-done">';
      h+='<div class="trade-done-date">'+fmtDate(td.date)+'</div>';
      h+='<div class="trade-done-row">';
      h+='<span class="trade-done-text">'+td.off+' &#8651; '+capLabel(td.ot)+' / '+capLabel(td.rt)+' mit '+td.rec+'</span>';
      h+=(ok?'<span class="status-ok">&#10003; Angenommen</span>':'<span class="status-no">&#10005; Abgelehnt</span>');
      h+='</div></div>';
    }
  }
  h+='</div>';
  return h;
}

doLoad();
</script>
</body>
</html>
