<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GLOWroom">
<meta name="theme-color" content="#0F172A">
<meta name="mobile-web-app-capable" content="yes">
<title>theGLOWroom — Terminplan</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%230F172A'/><text x='50' y='62' text-anchor='middle' font-size='44' fill='%23F59E0B'>G</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230F172A'/><text x='90' y='112' text-anchor='middle' font-size='80' font-weight='bold' fill='%23F59E0B'>G</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior:none}
body{font-family:'DM Sans','Segoe UI',sans-serif;background:#0F172A;color:#E2E8F0;min-height:100dvh;padding-bottom:env(safe-area-inset-bottom)}
::-webkit-scrollbar{height:4px;width:4px}
::-webkit-scrollbar-track{background:#1E293B}
::-webkit-scrollbar-thumb{background:#475569;border-radius:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.7}50%{opacity:1}}
@keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:600px}}
a{color:inherit;text-decoration:none}

/* NAV TABS */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:#1E293B;border-top:1px solid #334155;display:flex;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;border:none;background:none;color:#64748B;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;transition:color .2s}
.nav-btn.active{color:#3B82F6}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none}

/* HEADER */
.hdr{background:linear-gradient(135deg,#1E293B,#0F172A);padding:16px 16px 14px;border-bottom:1px solid #334155;position:sticky;top:0;z-index:50}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#64748B;margin-bottom:2px}
.hdr-title{font-size:22px;font-weight:700;color:#F8FAFC;letter-spacing:-.5px;display:flex;align-items:center;gap:8px}
.hdr-title .dot{width:8px;height:8px;border-radius:50%;background:#22C55E;box-shadow:0 0 8px #22C55E;flex-shrink:0}
.hdr-addr{font-size:12px;color:#475569;margin-top:2px}
.hdr-badges{display:flex;gap:6px;margin-top:10px}
.badge{background:#0F172A;border:1px solid #334155;border-radius:10px;padding:8px 14px;text-align:center;flex:1}
.badge-label{font-size:10px;color:#64748B;font-weight:500}
.badge-val{font-size:15px;font-weight:700;color:#F8FAFC;margin-top:1px}
.badge-val.gold{color:#F59E0B}

/* COUNTDOWN */
.countdown{display:flex;gap:6px;margin-top:10px}
.cd-box{flex:1;background:#F59E0B12;border:1px solid #F59E0B30;border-radius:10px;padding:8px 0;text-align:center}
.cd-num{font-size:22px;font-weight:700;color:#F59E0B;font-family:'JetBrains Mono',monospace}
.cd-lbl{font-size:9px;color:#F59E0B90;font-weight:600;text-transform:uppercase;letter-spacing:1px}

/* VIEWS */
.view{display:none;padding-bottom:80px}
.view.active{display:block}

/* TIMELINE VIEW */
.tl-section{margin:12px 12px 0;animation:fadeIn .25s ease}
.tl-cat-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:12px;cursor:pointer;transition:background .15s;-webkit-user-select:none;user-select:none}
.tl-cat-header:active{transform:scale(.98)}
.tl-cat-dot{width:12px;height:12px;border-radius:4px;flex-shrink:0}
.tl-cat-name{font-size:14px;font-weight:700;flex:1}
.tl-cat-arrow{font-size:10px;transition:transform .2s;opacity:.5}
.tl-cat-arrow.open{transform:rotate(90deg)}
.tl-cat-contact{font-size:11px;color:#64748B;margin-top:1px}
.tl-tasks{overflow:hidden;transition:max-height .3s ease}
.tl-task{padding:6px 14px 6px 36px;display:flex;align-items:center;gap:10px;animation:fadeIn .2s ease}
.tl-task-name{font-size:12px;color:#94A3B8;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-task-bar-wrap{width:120px;height:14px;background:#1E293B;border-radius:7px;overflow:hidden;flex-shrink:0;position:relative}
.tl-task-bar{height:100%;border-radius:7px;transition:width .4s ease}
.tl-task-dates{font-size:10px;color:#475569;font-family:'JetBrains Mono',monospace;white-space:nowrap}

/* GANTT VIEW */
.gantt-outer{overflow:hidden;margin-top:8px}
.gantt-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:12px}
.gantt-months{display:flex;height:24px}
.gantt-months div{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;text-transform:uppercase}
.gantt-days{display:flex;height:32px}
.g-day{display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;position:relative}
.g-day .dn{font-family:'JetBrains Mono',monospace;font-weight:500}
.g-day .dw{font-size:8px;color:#475569}
.g-day.today{background:#3B82F620}
.g-day.today .dn,.g-day.today .dw{color:#60A5FA;font-weight:700}
.g-day.nonwork{background:#0D111A}
.g-day.nonwork .dn,.g-day.nonwork .dw{color:#1E293B}
.g-day.opening::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:14px;height:2px;background:#F59E0B;border-radius:1px}

.g-cat-row{display:flex;height:28px}
.g-task-row{display:flex;height:24px;position:relative}
.g-cell{height:100%}
.g-bar{position:absolute;top:3px;height:18px;border-radius:6px;cursor:default;transition:filter .1s}
.g-today-line{position:absolute;top:0;width:2px;height:100%;background:#3B82F6;opacity:.5;pointer-events:none}
.g-open-line{position:absolute;top:0;width:2px;height:100%;background:#F59E0B;opacity:.3;pointer-events:none}

.g-label-col{min-width:160px;max-width:160px;flex-shrink:0;border-right:1px solid #1E293B;background:#0F172A;z-index:2}
.g-label-spacer-m{height:24px;border-bottom:1px solid #1E293B}
.g-label-spacer-d{height:32px;border-bottom:1px solid #334155}
.g-label-cat{height:28px;display:flex;align-items:center;gap:6px;padding:0 10px;font-size:11px;font-weight:700;border-bottom:1px solid #1E293B;cursor:pointer}
.g-label-task{height:24px;display:flex;align-items:center;padding:0 10px 0 20px;font-size:10px;color:#94A3B8;border-bottom:1px solid #1E293B08;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* CONTACTS VIEW */
.contacts-list{padding:12px}
.c-card{background:#1E293B;border-radius:14px;padding:16px;margin-bottom:10px;animation:fadeIn .25s ease}
.c-card-cat{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.c-card-name{font-size:17px;font-weight:700;color:#F8FAFC}
.c-card-phone{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:8px 16px;border-radius:10px;font-size:14px;font-family:'JetBrains Mono',monospace;font-weight:500;transition:background .15s}
.c-card-phone:active{transform:scale(.97)}
.c-card-company{font-size:12px;color:#475569;margin-top:8px;line-height:1.4}
.c-card-phone svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none}

/* NOTES VIEW */
.notes-list{padding:16px}
.note{background:#1E293B;border-radius:14px;padding:16px;margin-bottom:10px;font-size:14px;line-height:1.6;color:#CBD5E1;animation:fadeIn .25s ease}
.note strong{color:#F59E0B}
.note .icon{font-size:18px;margin-right:6px}

/* TASK DETAIL MODAL */
.modal-bg{position:fixed;inset:0;background:#00000080;z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s ease}
.modal{background:#1E293B;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:70vh;overflow-y:auto;padding:20px 20px calc(20px + env(safe-area-inset-bottom));animation:fadeIn .2s ease}
.modal-handle{width:40px;height:4px;background:#475569;border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;color:#F8FAFC;margin-bottom:4px}
.modal-sub{font-size:12px;color:#64748B;margin-bottom:12px}
.modal-dates{display:flex;flex-wrap:wrap;gap:6px}
.modal-date{font-size:11px;padding:4px 10px;border-radius:6px;font-family:'JetBrains Mono',monospace}
.modal-date.work{background:#22C55E20;color:#22C55E}
.modal-date.done{background:#475569;color:#64748B;text-decoration:line-through}
.modal-date.future{background:#3B82F620;color:#60A5FA}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ── DATA ──
const TRADES=[
  {cat:"Elektroausbau",color:"#3B82F6",contact:{name:"Lukas Greil",phone:"044 781 46 76",co:"Greil Elektro GmbH, Burstel 3, 8820 Wädenswil"},tasks:[
    {name:"EG+OG Elektroausbau (+Baustrom)",days:[1,2,7,8,9,10,13,14,15,16,17,23,24,27,37,38]},
    {name:"Elektro in Wände und Decke",days:[7,8,9,10,13]},
    {name:"Allgemeine Arbeiten",days:[14,15,16,17]},
    {name:"Leuchten Installation",days:[23,24,27]},
    {name:"Abschluss / Kontrolle / Abnahme",days:[37]}]},
  {cat:"Sanitär",color:"#0891B2",contact:{name:"Silvan Löhrer",phone:"079 595 44 65",co:"Holzbau und Schreinerei Löhrer GmbH, Blegistrasse 3, 6340 Baar"},tasks:[
    {name:"Sanitär Zuleitung Küche",days:[1,2,37]},
    {name:"Abschluss / Kontrolle / Abnahme",days:[37]}]},
  {cat:"Holz- / Leichtbau",color:"#8B5CF6",contact:{name:"Silvan Löhrer",phone:"079 595 44 65",co:"Holzbau und Schreinerei Löhrer GmbH, Blegistrasse 3, 6340 Baar"},tasks:[
    {name:"EG+OG Holz- / Leichtbau",days:[1,2,7,8,9,10,13,14,15,16,17,29,30,34,35,36,37]},
    {name:"EG Wand halbseitig",days:[1,2,7]},
    {name:"EG UK abgehängte Decke",days:[1,2,7]},
    {name:"OG UK Küche Vorwand",days:[1,2,7]},
    {name:"Allgemeine Arbeiten",days:[8,9,10,13]},
    {name:"Wände & Decke schliessen",days:[14,15,16,17]},
    {name:"Kücheninstallation",days:[29,30]},
    {name:"Bodenlegen inkl. Treppenstufen",days:[34,35,36]},
    {name:"Abschluss / Kontrolle / Abnahme",days:[37]}]},
  {cat:"Maler & Gipser",color:"#DC2626",contact:{name:"Marcel Frey",phone:"079 948 83 21",co:"Maler-Design GmbH, Kirchfeldstrasse 12, 6415 Arth"},tasks:[
    {name:"Maler und Gipserarbeiten",days:[16,17,20,21,22,37]},
    {name:"Allgemeine Malerarbeiten",days:[16,17]},
    {name:"Decke & Wände streichen",days:[20,21,22]},
    {name:"Abschluss / Kontrolle / Abnahme",days:[37]}]},
  {cat:"Lüftung",color:"#059669",contact:{name:"Dario Vötsch",phone:"079 890 72 96",co:"ReWert AG, Goldbrunnenstrasse 132, 8055 Zürich"},tasks:[
    {name:"OG Lüftung",days:[23,24,27,37]},
    {name:"Abschluss / Kontrolle / Abnahme",days:[37]}]},
  {cat:"Treppe & Geländer",color:"#D97706",contact:{name:"Fabian Steiner",phone:"044 784 01 88",co:"Steiner Metallbau GmbH, Obere Schwandenstrasse 10b, 8833 Samstagern"},tasks:[
    {name:"Treppe und Geländer",days:[28,29,30,37]},
    {name:"Abschluss / Kontrolle / Abnahme",days:[37]}]},
  {cat:"Vorhang",color:"#7C3AED",contact:null,tasks:[
    {name:"Vorhang Installation",days:[36,37]}]},
];

const AUFTRAGGEBER=[
  {name:"Nicole Schalko",phone:"076 414 08 83"},
  {name:"Florian Schalko",phone:"079 510 38 48"},
];

const START=new Date(2026,3,1),TOTAL=40,HOLIDAYS=[3,6,31],OPENING=38,CW=28;
const MO=["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
const WD=["So","Mo","Di","Mi","Do","Fr","Sa"];

function dd(d){const t=new Date(START);t.setDate(t.getDate()+d-1);return t}
function isWE(d){const w=dd(d).getDay();return w===0||w===6}
function isHL(d){return HOLIDAYS.includes(d)}
function isNW(d){return isWE(d)||isHL(d)}
function fmt(d){const t=dd(d);return`${WD[t.getDay()]}, ${t.getDate()}. ${MO[t.getMonth()]}`}
function fmtShort(d){const t=dd(d);return`${t.getDate()}.${t.getMonth()+1}.`}

function todayNum(){
  const t=new Date();t.setHours(0,0,0,0);
  const s=new Date(START);s.setHours(0,0,0,0);
  const diff=Math.floor((t-s)/864e5)+1;
  return(diff>=1&&diff<=TOTAL)?diff:null;
}
const TODAY=todayNum();

function daysUntilOpening(){
  const open=dd(OPENING);
  const now=new Date();now.setHours(0,0,0,0);
  return Math.max(0,Math.ceil((open-now)/864e5));
}

function spans(days){
  if(!days.length)return[];
  const s=[...days].sort((a,b)=>a-b),r=[];
  let a=s[0],b=s[0];
  for(let i=1;i<s.length;i++){if(s[i]<=b+3)b=s[i];else{r.push([a,b]);a=s[i];b=s[i]}}
  r.push([a,b]);return r;
}

function workDays(days){return days.filter(d=>!isNW(d))}
function pastDays(days){if(!TODAY)return[];return workDays(days).filter(d=>d<TODAY)}
function progress(days){const wd=workDays(days);if(!wd.length)return 0;return Math.min(100,Math.round(pastDays(days).length/wd.length*100))}

// ── STATE ──
let view='timeline',expanded=new Set(TRADES.map(t=>t.cat)),modal=null;

// ── ICONS ──
const IC={
  timeline:`<svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>`,
  gantt:`<svg viewBox="0 0 24 24"><rect x="3" y="4" width="8" height="4" rx="1"/><rect x="7" y="10" width="10" height="4" rx="1"/><rect x="5" y="16" width="6" height="4" rx="1"/></svg>`,
  contacts:`<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
  notes:`<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
  phone:`<svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`,
};

// ── RENDER ──
function render(){
  const daysLeft=daysUntilOpening();
  const d=Math.floor(daysLeft);
  const app=document.getElementById('app');

  // Header
  let h=`<div class="hdr">
    <div class="hdr-row">
      <div>
        <div class="hdr-label">Terminplan Ausbau</div>
        <div class="hdr-title"><span class="dot"></span>theGLOWroom</div>
        <div class="hdr-addr">Seestrasse 287a, 8804 Au ZH</div>
      </div>
    </div>
    <div class="hdr-badges">
      <div class="badge"><div class="badge-label">Schlüssel</div><div class="badge-val">01.04.</div></div>
      <div class="badge"><div class="badge-label">Eröffnung</div><div class="badge-val gold">08.05.</div></div>
      <div class="badge"><div class="badge-label">Noch</div><div class="badge-val gold">${d>0?d+' Tage':'Heute!'}</div></div>
    </div>
  </div>`;

  // Views
  let content='';
  if(view==='timeline') content=renderTimeline();
  else if(view==='gantt') content=renderGantt();
  else if(view==='contacts') content=renderContacts();
  else if(view==='notes') content=renderNotes();

  // Nav
  const nav=`<nav class="nav">
    ${navBtn('timeline','Timeline',IC.timeline)}
    ${navBtn('gantt','Gantt',IC.gantt)}
    ${navBtn('contacts','Kontakte',IC.contacts)}
    ${navBtn('notes','Infos',IC.notes)}
  </nav>`;

  app.innerHTML=h+`<div class="view active">${content}</div>`+nav+(modal?renderModal():'');
}

function navBtn(v,label,icon){
  return`<button class="nav-btn ${view===v?'active':''}" onclick="switchView('${v}')">${icon}<span>${label}</span></button>`;
}

// ── TIMELINE VIEW ──
function renderTimeline(){
  let html='';
  TRADES.forEach(trade=>{
    const open=expanded.has(trade.cat);
    const prog=progress(trade.tasks[0].days);
    html+=`<div class="tl-section">
      <div class="tl-cat-header" style="background:${trade.color}15" onclick="toggle('${trade.cat}')">
        <div class="tl-cat-dot" style="background:${trade.color}"></div>
        <div style="flex:1;min-width:0">
          <div class="tl-cat-name" style="color:${trade.color}">${trade.cat}</div>
          ${trade.contact?`<div class="tl-cat-contact">${trade.contact.name}</div>`:''}
        </div>
        <div style="width:50px;height:6px;background:#0F172A;border-radius:3px;overflow:hidden;flex-shrink:0">
          <div style="width:${prog}%;height:100%;background:${trade.color};border-radius:3px;transition:width .4s"></div>
        </div>
        <span style="font-size:11px;color:${trade.color};font-weight:700;min-width:32px;text-align:right">${prog}%</span>
        <span class="tl-cat-arrow ${open?'open':''}" style="color:${trade.color}">▶</span>
      </div>
      <div class="tl-tasks" style="max-height:${open?'600px':'0'};opacity:${open?1:0}">
        ${trade.tasks.map(task=>{
          const wd=workDays(task.days);
          const sp=spans(task.days);
          const firstDay=sp.length?sp[0][0]:0;
          const lastDay=sp.length?sp[sp.length-1][1]:0;
          const taskProg=progress(task.days);
          const isAbschluss=task.name.includes('Abschluss');
          return`<div class="tl-task" onclick="openModal('${trade.cat}','${task.name.replace(/'/g,"\\'")}')">
            <div class="tl-task-name">${isAbschluss?'✓ ':''}<span>${task.name}</span></div>
            <div class="tl-task-bar-wrap">
              <div class="tl-task-bar" style="width:${Math.max(3,(lastDay-firstDay+1)/TOTAL*100)}%;background:${isAbschluss?`repeating-linear-gradient(135deg,${trade.color}60,${trade.color}60 2px,${trade.color}30 2px,${trade.color}30 4px)`:`linear-gradient(90deg,${trade.color}CC,${trade.color}80)`};margin-left:${(firstDay-1)/TOTAL*100}%"></div>
            </div>
            <div class="tl-task-dates">${fmtShort(firstDay)}–${fmtShort(lastDay)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  return html;
}

// ── GANTT VIEW ──
function renderGantt(){
  const totalW=TOTAL*CW;
  const rows=[];
  TRADES.forEach(trade=>{
    const open=expanded.has(trade.cat);
    rows.push({type:'h',trade,open});
    if(open) trade.tasks.forEach(task=>rows.push({type:'t',task,trade}));
  });

  // Labels
  let labels=`<div class="g-label-spacer-m"></div><div class="g-label-spacer-d"></div>`;
  rows.forEach(r=>{
    if(r.type==='h') labels+=`<div class="g-label-cat" style="background:${r.trade.color}12;border-left:3px solid ${r.trade.color}" onclick="toggle('${r.trade.cat}')"><span class="tl-cat-arrow ${r.open?'open':''}" style="color:${r.trade.color};font-size:9px">▶</span><span style="color:${r.trade.color}">${r.trade.cat}</span></div>`;
    else labels+=`<div class="g-label-task" title="${r.task.name}">${r.task.name}</div>`;
  });

  // Days
  let dayH='';
  for(let d=1;d<=TOTAL;d++){
    const dt=dd(d),dom=dt.getDate(),cls=[d===TODAY?'today':'',isNW(d)?'nonwork':'',d===OPENING?'opening':''].filter(Boolean).join(' ');
    const bdr=dom===30&&d<=30?'border-right:2px solid #334155;':'';
    dayH+=`<div class="g-day ${cls}" style="width:${CW}px;min-width:${CW}px;${bdr}"><span class="dn">${dom}</span><span class="dw">${WD[dt.getDay()]}</span></div>`;
  }

  // Rows
  let rowsHTML='';
  rows.forEach(r=>{
    let cells='';
    for(let d=1;d<=TOTAL;d++){
      const dom=dd(d).getDate(),bdr=dom===30&&d<=30?'border-right:2px solid #334155;':'';
      let bg='transparent';
      if(d===TODAY)bg='#3B82F610';else if(d===OPENING)bg='#F59E0B08';else if(isNW(d))bg='#0D111A40';
      cells+=`<div class="g-cell" style="width:${CW}px;min-width:${CW}px;${bdr}background:${bg}"></div>`;
    }
    if(r.type==='h'){
      rowsHTML+=`<div class="g-cat-row" style="background:${r.trade.color}08">${cells}</div>`;
    } else {
      const sp=spans(r.task.days);
      let bars='';
      const isA=r.task.name.includes('Abschluss');
      sp.forEach(([a,b])=>{
        const l=(a-1)*CW+1,w=(b-a+1)*CW-2;
        const bg=isA?`repeating-linear-gradient(135deg,${r.trade.color}40,${r.trade.color}40 2px,${r.trade.color}20 2px,${r.trade.color}20 4px)`:`linear-gradient(135deg,${r.trade.color}CC,${r.trade.color}99)`;
        bars+=`<div class="g-bar" style="left:${l}px;width:${w}px;background:${bg};border:1px solid ${r.trade.color}60"></div>`;
      });
      let markers='';
      if(TODAY) markers+=`<div class="g-today-line" style="left:${(TODAY-1)*CW+CW/2-1}px"></div>`;
      markers+=`<div class="g-open-line" style="left:${(OPENING-1)*CW+CW/2-1}px"></div>`;
      rowsHTML+=`<div class="g-task-row">${cells}${bars}${markers}</div>`;
    }
  });

  return`<div class="gantt-outer"><div style="display:flex"><div class="g-label-col">${labels}</div><div class="gantt-scroll" id="ganttScroll"><div style="min-width:${totalW}px">
    <div class="gantt-months"><div style="width:${30*CW}px;border-right:2px solid #334155">April</div><div style="width:${10*CW}px">Mai</div></div>
    <div class="gantt-days">${dayH}</div>${rowsHTML}
  </div></div></div></div>`;
}

// ── CONTACTS VIEW ──
function renderContacts(){
  let html=`<div class="contacts-list">`;
  // Auftraggeber first
  html+=`<div class="c-card" style="border-left:4px solid #F59E0B">
    <div class="c-card-cat" style="color:#F59E0B">Auftraggeber</div>
    ${AUFTRAGGEBER.map(a=>`<div style="margin-bottom:10px">
      <div class="c-card-name">${a.name}</div>
      <a href="tel:${a.phone.replace(/\s/g,'')}" class="c-card-phone" style="background:#F59E0B20;color:#F59E0B">${IC.phone} ${a.phone}</a>
    </div>`).join('')}
  </div>`;
  
  TRADES.filter(t=>t.contact).forEach(t=>{
    html+=`<div class="c-card" style="border-left:4px solid ${t.color}">
      <div class="c-card-cat" style="color:${t.color}">${t.cat}</div>
      <div class="c-card-name">${t.contact.name}</div>
      <a href="tel:${t.contact.phone.replace(/\s/g,'')}" class="c-card-phone" style="background:${t.color}20;color:${t.color}">${IC.phone} ${t.contact.phone}</a>
      <div class="c-card-company">${t.contact.co}</div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

// ── MODAL ──
function renderModal(){
  if(!modal)return'';
  const trade=TRADES.find(t=>t.cat===modal.cat);
  if(!trade)return'';
  const task=trade.tasks.find(t=>t.name===modal.task);
  if(!task)return'';
  const wd=workDays(task.days);
  
  return`<div class="modal-bg" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-title" style="color:${trade.color}">${task.name}</div>
      <div class="modal-sub">${trade.cat} — ${wd.length} Arbeitstage</div>
      <div style="font-size:12px;color:#64748B;margin-bottom:12px">Fortschritt: <strong style="color:${trade.color}">${progress(task.days)}%</strong></div>
      <div class="modal-dates">
        ${task.days.map(d=>{
          const past=TODAY&&d<TODAY;
          const today=d===TODAY;
          const nw=isNW(d);
          let cls=past?'done':today?'work':'future';
          if(nw)cls='done';
          return`<div class="modal-date ${cls}">${fmt(d)}${nw?' (frei)':''}${today?' ← heute':''}</div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

// ── ACTIONS ──
function switchView(v){view=v;render();
  if(v==='gantt')setTimeout(()=>{
    const el=document.getElementById('ganttScroll');
    if(el&&TODAY)el.scrollLeft=Math.max(0,(TODAY-1)*CW-el.clientWidth/2);
  },50);
}
function toggle(cat){if(expanded.has(cat))expanded.delete(cat);else expanded.add(cat);render()}
function openModal(cat,task){modal={cat,task};render()}
function closeModal(e){if(e.target.classList.contains('modal-bg')){modal=null;render()}}

// Init
render();
</script>
